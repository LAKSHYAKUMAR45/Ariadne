name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # packages/sync-server's test suite talks to a real Postgres instance
    # (no mocking — see packages/sync-server/README.md) via TEST_DATABASE_URL,
    # which defaults to postgres://postgres:ariadne@localhost:55432/ariadne_sync_test.
    # This service container matches that default exactly so CI needs no
    # extra env vars, mirroring the `docker run ariadne-sync-test-pg` setup
    # documented for local development.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ariadne
          POSTGRES_DB: ariadne_sync_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @ariadne-dev/core must be built before packages/cli or
      # packages/vscode-extension can typecheck/test, since they import its
      # compiled dist/. `pnpm -r run build` runs in workspace dependency
      # order, so this handles that automatically.
      - name: Build all packages
        run: pnpm run build

      - name: Typecheck all packages
        run: pnpm -r exec tsc --noEmit -p tsconfig.json

      - name: Test all packages
        run: pnpm run test

      - name: Verify the extension still bundles and packages
        run: |
          pnpm --filter ariadne-vscode exec vsce package --no-dependencies -o /tmp/ci-check.vsix
